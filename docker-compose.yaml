version: "3.9"

networks:
  dockerlab-network:
    driver: bridge

services:

  db:
    image: mysql:8.4
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always
    networks:
      - dockerlab-network

  redis:
    image: redis:7
    container_name: redis

  app:
    build: .
    container_name: app-container
    depends_on:
      - db
      - redis
    ports:
      - "8888:8888"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: always
    networks:
      - dockerlab-network

volumes:
  db_data: